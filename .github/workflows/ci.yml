name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r model/requirements.txt

      - name: Generate datasets
        working-directory: model
        run: python data_generator.py

      - name: Train models
        working-directory: model
        run: |
          python train_v1.py
          python train_v2.py

      - name: Copy artifacts to project root
        run: |
          cp model/artifacts/* artifacts/
          cp model/metrics/* metrics/

      - name: Run model tests
        run: pytest model/tests/ -v

      - name: Run metrics validation tests
        run: pytest tests/metrics/ -v

  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test scorer
        working-directory: scorer
        run: mvn test -B

  integration-tests:
    runs-on: ubuntu-latest
    needs: [python-tests, java-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r model/requirements.txt

      - name: Generate data and train models
        working-directory: model
        run: |
          python data_generator.py
          python train_v1.py
          python train_v2.py

      - name: Copy artifacts
        run: |
          cp model/artifacts/* artifacts/
          cp model/metrics/* metrics/

      - name: Evaluate models
        working-directory: model
        run: python evaluate.py

      - name: Validate all metrics
        run: pytest tests/metrics/ -v
